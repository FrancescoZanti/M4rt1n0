version: '3.8'

services:
  backend:
    build:
      context: ./backend
    # Using host network mode so the container can reach the host's 127.0.0.1 natively
    network_mode: "host"
    environment:
      - LLM_PROVIDER=local
      - LOCAL_LLM_BASE_URL=http://127.0.0.1:11434/v1
      - LOCAL_LLM_MODEL=llama3
    volumes:
      # Persist the sqlite DB in production
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    restart: unless-stopped
